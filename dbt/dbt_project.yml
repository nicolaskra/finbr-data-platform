name: 'finbr'
version: '0.1.0'
config-version: 2

profile: 'finbr'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  finbr:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      core:
        +schema: core
      analytics:
        +schema: analytics

vars:
  # Caminho dos dados raw (relativo a project root; via DuckDB read_parquet)
  raw_path: '/opt/airflow/data/raw'
  # Sobrescrevivel via --vars '{raw_path: ./data/raw}' (dev local)
