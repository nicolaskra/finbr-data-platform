# Airflow Standalone para desenvolvimento local
# Decisao: Standalone (single-node + SQLite) ao inves de full setup (Postgres + Redis + Celery)
# Motivo: portfolio local, simplicidade > performance. Em prod seria diferente.
# Ver: docs/decisions/001-why-airflow-standalone.md
#
# Subir: docker compose up -d
# Acessar: http://localhost:8080
# Login: admin / senha gerada em airflow/standalone_admin_password.txt
# Parar:  docker compose down

services:
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: finbr-airflow
    restart: unless-stopped
    environment:
      # Modo Standalone (SQLite metadata, Sequential Executor)
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./data:/opt/airflow/data
    command: ["airflow", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
