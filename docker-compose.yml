# Airflow Standalone para desenvolvimento local
# Decisao: Standalone (single-node + SQLite) ao inves de full setup (Postgres + Redis + Celery)
# Motivo: portfolio local, simplicidade > performance. Em prod seria diferente.
# Ver: docs/decisions/001-why-airflow-standalone.md
#
# Subir: docker compose up -d
# Acessar: http://localhost:8080
# Login: admin / senha gerada em airflow/standalone_admin_password.txt
# Parar:  docker compose down

# Stack finbr — Airflow (orquestracao) + API (FastAPI) + Dashboard (Streamlit).
# Subir tudo: docker compose up -d
# Endpoints:
#   - Airflow:   http://localhost:8080  (admin / senha em airflow/standalone_admin_password.txt)
#   - API:       http://localhost:8000/docs
#   - Dashboard: http://localhost:8501

services:
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: finbr-airflow
    restart: unless-stopped
    environment:
      # Modo Standalone (SQLite metadata, Sequential Executor)
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt
    command: ["airflow", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: app/api/Dockerfile
    container_name: finbr-api
    restart: unless-stopped
    environment:
      FINBR_DUCKDB_PATH: /opt/finbr/data/warehouse/finbr.duckdb
      FINBR_CORS_ORIGINS: "http://localhost:8501"
    ports:
      - "8000:8000"
    volumes:
      # Read-only no warehouse — DuckDB suporta multi-reader concorrente
      - ./data:/opt/finbr/data:ro
    depends_on:
      airflow:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: app/dashboard/Dockerfile
    container_name: finbr-dashboard
    restart: unless-stopped
    environment:
      FINBR_API_URL: http://api:8000
      FINBR_DEFAULT_MES: "2026-04-01"
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
